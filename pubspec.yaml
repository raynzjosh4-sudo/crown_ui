name: crown_ui
description: A comprehensive, CSS-like UI framework for Flutter with 60+ pre-built components, design tokens, themes, and multi-platform support. Inspired by web development and Kivy, Crown UI provides a modern alternative to Material Design with seamless support for iOS, Android, Windows, macOS, and Web.
version: 0.1.0

homepage: https://github.com/raynzjosh4-sudo/crown_ui
repository: https://github.com/raynzjosh4-sudo/crown_ui
issue_tracker: https://github.com/raynzjosh4-sudo/crown_ui/issues
documentation: https://pub.dev/packages/crown_ui

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

topics:
  - ui
  - design-system
  - components
  - theme
  - responsive
